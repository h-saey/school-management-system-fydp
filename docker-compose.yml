version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sms-sql
    environment:
      SA_PASSWORD: "YourStrong@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./backup:/var/opt/mssql/backup
    restart: always

  backend:
    build:
      context: ./src/backend/SMS_Backend
      dockerfile: Dockerfile
    container_name: sms-api
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SchoolManagementDB;User Id=sa;Password=YourStrong@123;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_started
    restart: always

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    #ports:
    #  - "3000:5173"
    depends_on:
      - backend

  gateway:
    image: nginx:alpine
    container_name: sms-gateway
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./src/frontend/build:/usr/share/nginx/html

    depends_on:
      - backend

volumes:
  sql_data:
